<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZ-piratory System</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #020617; --surface: rgba(30, 41, 59, 0.7);
            --accent: #6366f1; --warning: #f59e0b;
            --success: #10b981; --danger: #ef4444; --text-dim: #94a3b8;
            --m-blue: #3b82f6; --m-pink: #ec4899; --m-orange: #f97316; --m-yellow: #eab308;
        }
        body {
            font-family: 'Inter', sans-serif; background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent);
            color: white; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .login-card { background: var(--surface); padding: 3rem; border-radius: 24px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        input { padding: 12px 20px; font-size: 1rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; margin-bottom: 1rem; outline: none; }
        
        #admin-view, #player-view { display: none; }
        #admin-view { padding: 2rem; flex-direction: column; height: 100%; overflow-y: auto; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; background: var(--surface); padding: 1.5rem; border-radius: 16px; margin-bottom: 2rem; }
        
        /* UPDATED: Admin Review Styles to 4 Columns */
        .admin-review-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px; 
            margin-bottom: 2.5rem; 
            width: 100%; 
        }
        .review-card { 
            display: flex; 
            flex-direction: column; 
            background: rgba(255,255,255,0.03); 
            padding: 15px; 
            border-radius: 16px; 
            border: 1px solid rgba(255,255,255,0.05); 
            text-align: center;
            transition: transform 0.2s;
        }
        .review-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.06); }
        .review-card span { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 8px; font-weight: bold; }
        .review-btn { width: 100%; height: 50px; border-radius: 10px; border: none; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; font-size: 0.8rem; }
        
        .scoreboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 1rem; margin-top: 1rem; }
        .group-stat { background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.1); animation: popIn 0.3s ease-out; }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        #player-view { flex: 1; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 2rem; }
        .buzzer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 600px; }
        
        .quiz-btn { height: 140px; border: none; border-radius: 24px; font-size: 1.2rem; font-weight: 800; color: white; cursor: pointer; transition: all 0.3s; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .quiz-btn:active { transform: scale(0.95); }
        .quiz-btn:disabled { cursor: not-allowed; opacity: 0.8; }
        
        #btn-blue, .bg-blue { background: var(--m-blue); }
        #btn-pink, .bg-pink { background: var(--m-pink); }
        #btn-orange, .bg-orange { background: var(--m-orange); }
        #btn-yellow, .bg-yellow { background: var(--m-yellow); }

        .btn-correct { background: var(--success) !important; box-shadow: 0 0 30px var(--success) !important; animation: pulse-green 2s infinite; }
        .btn-wrong { background: var(--danger) !important; box-shadow: 0 0 30px var(--danger) !important; opacity: 0.7; }
        
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        .locked-label { position: absolute; bottom: 10px; left: 0; right: 0; font-size: 0.7rem; color: #fff; font-weight: 400; text-transform: uppercase; }

        .timer-circle { width: 100px; height: 100px; border-radius: 50%; border: 6px solid var(--accent); display: flex; justify-content: center; align-items: center; font-size: 2.5rem; font-weight: 900; margin-bottom: 1rem; transition: all 0.5s; }
        .timer-warning { border-color: var(--danger); color: var(--danger); animation: shake 0.5s infinite; }

        #modal-overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); z-index: 1000; display: none; justify-content: center; align-items: center; flex-direction: column; backdrop-filter: blur(10px); }
        .mcq-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 2rem 0; width: 100%; }
        .option-btn { padding: 18px; background: var(--surface); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 12px; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .option-btn:hover { background: var(--accent); }
        
        .btn-submit { padding: 12px 30px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-fullscreen { position: fixed; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: none; color: white; padding: 10px; border-radius: 50%; cursor: pointer; z-index: 3000; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; }
        #yt-player-container { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>

    <div id="yt-player-container"><div id="player"></div></div>

    <button class="btn-fullscreen" onclick="toggleFullScreen()"><svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></button>

    <div id="login-overlay">
        <div class="login-card">
            <h1 style="letter-spacing: 5px; color: var(--accent);">QUIZ-piratory Login</h1>
            <input type="password" id="login-input" placeholder="Group #">
            <br>
            <button class="btn-submit" onclick="handleLogin()">CONNECT</button>
        </div>
    </div>

    <section id="admin-view">
        <div class="admin-header">
            <div><h2 style="margin:0">Admin Control</h2><p id="admin-set-info" style="color: var(--warning)">Ready to Launch</p></div>
            <div class="timer-circle" id="admin-timer">30</div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <select id="set-selector" style="padding: 12px; border-radius: 12px; background: var(--surface); color: white; border: 1px solid rgba(255,255,255,0.2); cursor: pointer;"></select>
                <button class="btn-submit" onclick="triggerSelectedSet()">LAUNCH SET</button>
                <button class="btn-submit" style="background: var(--danger)" onclick="stopMusic()">STOP MUSIC</button>
            </div>
        </div>

        <h3 style="color:var(--accent); text-transform:uppercase; font-size:0.9rem; letter-spacing:2px; margin-bottom: 15px;">Review Master (Post-Game)</h3>
        <div class="admin-review-grid">
            <div class="review-card"><span>MODULE 1</span><button class="review-btn bg-blue" onclick="loadQuestion('blue')">BLUE</button></div>
            <div class="review-card"><span>MODULE 2</span><button class="review-btn bg-pink" onclick="loadQuestion('pink')">PINK</button></div>
            <div class="review-card"><span>MODULE 3</span><button class="review-btn bg-orange" onclick="loadQuestion('orange')">ORANGE</button></div>
            <div class="review-card"><span>MODULE 4</span><button class="review-btn bg-yellow" onclick="loadQuestion('yellow')">YELLOW</button></div>
        </div>

        <h3 style="color:var(--text-dim); text-transform:uppercase; font-size:0.9rem; letter-spacing:2px;">Group Performance</h3>
        <div class="scoreboard-grid" id="admin-scoreboard"></div>
    </section>

    <section id="player-view">
        <div id="my-group-label" style="letter-spacing:4px; font-weight:900; color:var(--accent); margin-bottom: 15px;">GROUP</div>
        <div class="timer-circle" id="player-timer">30</div>
        <div class="buzzer-grid">
            <button id="btn-blue" class="quiz-btn" onclick="loadQuestion('blue')">BLUE</button>
            <button id="btn-pink" class="quiz-btn" onclick="loadQuestion('pink')">PINK</button>
            <button id="btn-orange" class="quiz-btn" onclick="loadQuestion('orange')">ORANGE</button>
            <button id="btn-yellow" class="quiz-btn" onclick="loadQuestion('yellow')">YELLOW</button>
        </div>
    </section>

    <div id="modal-overlay">
        <div class="modal-card" style="text-align:center; width:85%; max-width:450px;">
            <h2 id="display-q">Question?</h2>
            <div id="area-id"><input type="text" id="answer-id" placeholder="Type answer here..." style="width:90%; text-align:center;"></div>
            <div id="area-mcq" class="mcq-grid"></div>
            <div id="modal-footer" style="margin-top: 2rem;">
                <button id="final-submit-btn" class="btn-submit" onclick="submitAnswer()">SUBMIT ANSWER</button>
                <button class="btn-submit" style="background:#475569" onclick="closeModal()">CLOSE</button>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const socket = io();
        let myRole = "", currentQ = null, activeColor = "", currentSet = null;

        let ytPlayer;
        const videoIds = ['9v6p-QxGZQI', 'XfR9iY5y94s']; 
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', {
                height: '0', width: '0', videoId: videoIds[0],
                playerVars: { 'autoplay': 0, 'controls': 0, 'loop': 1, 'playlist': videoIds.join(',') },
                events: { 'onReady': () => console.log("Music Ready") }
            });
        }
        function playSyncMusic() { if (ytPlayer?.loadVideoById) ytPlayer.loadVideoById(videoIds[Math.floor(Math.random() * videoIds.length)]); ytPlayer.playVideo(); }
        function stopMusic() { ytPlayer?.pauseVideo?.(); socket.emit('sync-admin-text', 'STOP_MUSIC'); }
        function toggleFullScreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }

        const questionSets = {
            A: { blue: { q: "Unit of Force?", a: "newton", type: "mcq", choices: ["Joule", "Newton", "Watt", "Volt"] }, pink: { q: "Nearest star?", a: "sun", type: "id" }, yellow: { q: "Water Formula?", a: "h2o", type: "id" }, orange: { q: "Largest Planet?", a: "jupiter", type: "mcq", choices: ["Mars", "Jupiter", "Earth", "Saturn"] } },
            B: { blue: { q: "Powerhouse of cell?", a: "mitochondria", type: "id" }, pink: { q: "Gas we breathe out?", a: "co2", type: "mcq", choices: ["O2", "CO2", "N", "H"] }, yellow: { q: "Symbol for Gold?", a: "au", type: "id" }, orange: { q: "Speed of light (km/s)?", a: "300000", type: "id" } }
        };

        function handleLogin() {
            const val = document.getElementById('login-input').value.trim();
            if (val.toLowerCase() === 'admin') {
                myRole = "admin";
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('admin-view').style.display = 'flex';
                populateSetSelector();
            } else if (val.toLowerCase().startsWith('group')) {
                myRole = val;
                const groupNum = myRole.replace(/\D/g,'');
                socket.emit('group-login', groupNum);
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('player-view').style.display = 'flex';
                document.getElementById('my-group-label').innerText = myRole.toUpperCase();
            }
        }

        function populateSetSelector() {
            const selector = document.getElementById('set-selector');
            selector.innerHTML = "";
            Object.keys(questionSets).forEach(setName => {
                let opt = document.createElement("option"); opt.value = setName; opt.text = "SET " + setName;
                selector.appendChild(opt);
            });
        }

        function triggerSelectedSet() {
            socket.emit('change-set', document.getElementById('set-selector').value);
            socket.emit('start-timer');
            socket.emit('sync-admin-text', 'START_MUSIC'); 
        }

        function loadQuestion(color) {
            if (!currentSet) { alert("Please launch a Set first!"); return; }
            activeColor = color;
            currentQ = questionSets[currentSet][color];
            
            const pBtn = document.getElementById(`btn-${color}`);
            const isLocked = pBtn && (pBtn.classList.contains('btn-correct') || pBtn.classList.contains('btn-wrong'));
            
            document.getElementById('display-q').innerText = currentQ.q;
            const mcq = document.getElementById('area-mcq'), idArea = document.getElementById('area-id');
            
            if (currentQ.type === 'mcq') {
                idArea.style.display = 'none'; mcq.style.display = 'grid'; mcq.innerHTML = "";
                currentQ.choices.forEach(c => {
                    mcq.innerHTML += `<button class="option-btn" ${ (isLocked || myRole === "admin") ? 'disabled' : '' } onclick="document.getElementById('answer-id').value='${c}'">${c}</button>`;
                });
            } else {
                idArea.style.display = 'block'; mcq.style.display = 'none'; document.getElementById('answer-id').value = "";
                document.getElementById('answer-id').readOnly = (myRole === "admin");
            }
            
            const submitBtn = document.getElementById('final-submit-btn');
            if (myRole === "admin" || isLocked) {
                submitBtn.style.display = 'none';
            } else {
                submitBtn.style.display = 'inline-block';
            }
            
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function submitAnswer() {
            const ans = document.getElementById('answer-id').value.trim().toLowerCase();
            socket.emit('submit-module', { group: myRole.replace(/\D/g,''), color: activeColor, isCorrect: ans === currentQ.a.toLowerCase() });
            closeModal();
        }
        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

        socket.on('sync-admin-text', (msg) => { if (msg === 'START_MUSIC') playSyncMusic(); else ytPlayer?.pauseVideo?.(); });

        socket.on('update-active-groups', (activeGroups) => {
            if (myRole === "admin") {
                const board = document.getElementById('admin-scoreboard');
                board.innerHTML = "";
                activeGroups.sort((a,b) => a - b).forEach(num => {
                    board.innerHTML += `
                        <div class="group-stat" id="card-${num}">
                            <div>Group ${num}</div>
                            <div id="score-${num}" style="font-size:1.5rem; font-weight:bold; color:var(--accent)">0</div>
                        </div>`;
                });
            }
        });

        socket.on('module-synced', (data) => {
            if (myRole.toLowerCase() === `group ${data.group}`) {
                const btn = document.getElementById(`btn-${data.color}`);
                if (btn) {
                    btn.classList.add(data.status === 'correct' ? 'btn-correct' : 'btn-wrong');
                    btn.innerHTML = `${data.color.toUpperCase()}<div class="locked-label">LOCKED</div>`;
                }
            }
            const el = document.getElementById(`score-${data.group}`); 
            if (el) el.innerText = data.scores[data.group] || 0;
        });

        socket.on('set-updated', (data) => {
            currentSet = data.setName;
            if (myRole === "admin") document.getElementById('admin-set-info').innerText = "Active Set: " + data.setName;
            ['blue','pink','orange','yellow'].forEach(c => {
                const btn = document.getElementById(`btn-${c}`);
                if (btn) { btn.className = 'quiz-btn'; btn.disabled = false; btn.innerHTML = c.toUpperCase(); }
            });
        });

        socket.on('timer-tick', (t) => {
            document.querySelectorAll('.timer-circle').forEach(c => {
                c.innerText = t;
                if (t <= 5) c.classList.add('timer-warning'); else c.classList.remove('timer-warning');
            });
        });

        socket.on('timer-end', () => {
            document.querySelectorAll('.quiz-btn').forEach(b => b.disabled = true);
            closeModal(); ytPlayer?.pauseVideo?.();
        });

        socket.on('init-state', (state) => {
            if(state.isTimerRunning) currentSet = state.currentSet;
            if (myRole === "admin") {
                const board = document.getElementById('admin-scoreboard');
                board.innerHTML = "";
                state.activeGroups.sort((a,b) => a - b).forEach(num => {
                    board.innerHTML += `
                        <div class="group-stat">
                            <div>Group ${num}</div>
                            <div id="score-${num}" style="font-size:1.5rem; font-weight:bold; color:var(--accent)">${state.scores[num] || 0}</div>
                        </div>`;
                });
            }
        });
    </script>
</body>
</html>
