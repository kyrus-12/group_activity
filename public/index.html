<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIGHAM Pro - Realtime Quiz</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #020617;
            --surface: rgba(30, 41, 59, 0.7);
            --accent: #6366f1;
            --warning: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent);
            color: white;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Login Overlay --- */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: var(--surface);
            padding: 3rem;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        input {
            padding: 12px 20px;
            font-size: 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: white;
            margin-bottom: 1rem;
            outline: none;
        }

        /* --- Sections Visibility --- */
        #admin-view, #player-view { display: none; }

        /* --- Admin Dashboard --- */
        #admin-view {
            padding: 2rem;
            flex-direction: column;
            height: 100%;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 16px;
            margin-bottom: 2rem;
        }

        .scoreboard-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .group-stat {
            background: rgba(255,255,255,0.05);
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* --- Player View --- */
        #player-view {
            flex: 1;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .group-indicator {
            font-size: 1.2rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
        }

        .buzzer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 600px;
        }

        .quiz-btn {
            height: 150px;
            border: none;
            border-radius: 24px;
            font-size: 1.5rem;
            font-weight: 800;
            color: white;
            cursor: pointer;
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }

        .quiz-btn:hover:not(:disabled) {
            background: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .quiz-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* --- Timer Display --- */
        .timer-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 6px solid var(--accent);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            font-weight: 900;
            margin: 2rem 0;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.2);
        }

        /* --- Question Modal --- */
        #modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.98);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .modal-card {
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        .mcq-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 2rem 0;
        }

        .option-btn {
            padding: 20px;
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        .option-btn:hover { background: white; color: black; }

        .btn-submit {
            padding: 15px 40px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h1 style="margin-top:0">AIGHAM PRO</h1>
            <p style="color: var(--text-dim)">Access Code</p>
            <input type="password" id="login-input" placeholder="Admin or Group #">
            <br>
            <button class="btn-submit" onclick="handleLogin()">CONNECT SYSTEM</button>
        </div>
    </div>

    <section id="admin-view">
        <div class="admin-header">
            <div>
                <h2 style="margin:0">Admin Control Center</h2>
                <p id="admin-set-info" style="color: var(--warning)">Active Set: A</p>
            </div>
            <div class="timer-circle" id="admin-timer">30</div>
            <div>
                <button onclick="changeSet('A')">Set A</button>
                <button onclick="changeSet('B')">Set B</button>
                <button onclick="changeSet('C')">Set C</button>
            </div>
        </div>

        <div id="admin-q-display" style="text-align:center; font-size: 1.5rem; padding: 2rem; border: 1px dashed var(--accent)">
            Waiting for question selection...
        </div>

        <div class="scoreboard-grid" id="admin-scoreboard">
            </div>
    </section>

    <section id="player-view">
        <div class="group-indicator" id="my-group-label">Group X</div>
        <div class="timer-circle" id="player-timer">30</div>
        
        <div class="buzzer-grid">
            <button class="quiz-btn" onclick="loadQuestion('red')">MODULE 1</button>
            <button class="quiz-btn" onclick="loadQuestion('green')">MODULE 2</button>
            <button class="quiz-btn" onclick="loadQuestion('yellow')">MODULE 3</button>
            <button class="quiz-btn" onclick="loadQuestion('orange')">MODULE 4</button>
        </div>
    </section>

    <div id="modal-overlay">
        <div class="modal-card">
            <h2 id="display-q">Question?</h2>
            
            <div id="area-id">
                <input type="text" id="answer-id" placeholder="Your Answer..." style="width: 80%">
            </div>

            <div id="area-mcq" class="mcq-grid"></div>

            <button class="btn-submit" onclick="submitAnswer()">SUBMIT FINAL ANSWER</button>
        </div>
    </div>

    <script>
        const socket = io();
        let myRole = ""; // "admin" or "Group 1", etc.
        let currentQ = null;
        let currentSet = "A";
        let hasAnsweredThisRound = false;

        const questionSets = {
            A: {
                red: { q: "Unit of Force?", a: "newton", type: "mcq", choices: ["Joule", "Newton", "Watt", "Volt"] },
                green: { q: "Nearest star?", a: "sun", type: "id" },
                yellow: { q: "Water Formula?", a: "h2o", type: "id" },
                orange: { q: "Largest Planet?", a: "jupiter", type: "mcq", choices: ["Mars", "Jupiter", "Earth", "Saturn"] }
            },
            B: {
                red: { q: "Powerhouse of cell?", a: "mitochondria", type: "id" },
                green: { q: "Gas we breathe out?", a: "co2", type: "mcq", choices: ["O2", "CO2", "N", "H"] },
                yellow: { q: "Symbol for Gold?", a: "au", type: "id" },
                orange: { q: "Speed of light?", a: "300000", type: "id" }
            }
        };

        // --- LOGIN LOGIC ---
        function handleLogin() {
            const input = document.getElementById('login-input').value.trim();
            if (input.toLowerCase() === 'admin') {
                myRole = "admin";
                showAdmin();
            } else if (input.toLowerCase().startsWith('group')) {
                myRole = input; // e.g. "Group 1"
                showPlayer();
            } else {
                alert("Please enter 'admin' or 'Group 1' through 'Group 10'");
            }
        }

        function showAdmin() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('admin-view').style.display = 'flex';
            initScoreboard();
        }

        function showPlayer() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('player-view').style.display = 'flex';
            document.getElementById('my-group-label').innerText = myRole;
        }

        function initScoreboard() {
            const board = document.getElementById('admin-scoreboard');
            board.innerHTML = "";
            for (let i = 1; i <= 10; i++) {
                board.innerHTML += `
                    <div class="group-stat">
                        <div style="font-size:0.8rem; color:var(--text-dim)">Group ${i}</div>
                        <div id="score-${i}" style="font-size:1.5rem; font-weight:bold">0</div>
                    </div>
                `;
            }
        }

        // --- GAME ACTIONS ---
        function changeSet(s) {
            socket.emit('change-set', s);
        }

        function loadQuestion(color) {
            if (hasAnsweredThisRound) return;
            
            currentQ = questionSets[currentSet][color];
            document.getElementById('display-q').innerText = currentQ.q;
            
            const mcq = document.getElementById('area-mcq');
            const idArea = document.getElementById('area-id');
            
            if (currentQ.type === 'mcq') {
                idArea.style.display = 'none';
                mcq.style.display = 'grid';
                mcq.innerHTML = "";
                currentQ.choices.forEach(c => {
                    mcq.innerHTML += `<button class="option-btn" onclick="setAnswer('${c}')">${c}</button>`;
                });
            } else {
                idArea.style.display = 'block';
                mcq.style.display = 'none';
                document.getElementById('answer-id').value = "";
            }

            document.getElementById('modal-overlay').style.display = 'flex';
            socket.emit('start-timer');
            socket.emit('sync-admin-text', currentQ.q);
        }

        function setAnswer(val) {
            document.getElementById('answer-id').value = val;
        }

        function submitAnswer() {
            const userAns = document.getElementById('answer-id').value.trim().toLowerCase();
            const correctAns = currentQ.a.toLowerCase();
            
            const groupNum = myRole.split(" ")[1];
            
            if (userAns === correctAns) {
                socket.emit('update-score', { group: groupNum, points: 10 });
                alert("CORRECT! Point added.");
            } else {
                alert("WRONG! Correct answer: " + currentQ.a);
            }

            hasAnsweredThisRound = true;
            disableBuzzer();
            closeModal();
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        function disableBuzzer() {
            const btns = document.querySelectorAll('.quiz-btn');
            btns.forEach(b => b.disabled = true);
        }

        function enableBuzzer() {
            const btns = document.querySelectorAll('.quiz-btn');
            btns.forEach(b => b.disabled = false);
            hasAnsweredThisRound = false;
        }

        // --- SOCKETS ---
        socket.on('timer-tick', (t) => {
            document.getElementById('admin-timer').innerText = t;
            document.getElementById('player-timer').innerText = t;
        });

        socket.on('timer-end', () => {
            disableBuzzer();
            closeModal();
        });

        socket.on('score-updated', (scores) => {
            for (let i = 1; i <= 10; i++) {
                const el = document.getElementById(`score-${i}`);
                if (el) el.innerText = scores[i] || 0;
            }
        });

        socket.on('set-updated', (s) => {
            currentSet = s;
            if (myRole === "admin") document.getElementById('admin-set-info').innerText = "Active Set: " + s;
            enableBuzzer(); // Reset buttons when admin changes set
        });

        socket.on('sync-admin-text', (txt) => {
            if (myRole === "admin") document.getElementById('admin-q-display').innerText = "LIVE QUESTION: " + txt;
        });

    </script>
</body>
</html>
