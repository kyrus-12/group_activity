<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIGHAM Pro - Realtime Quiz</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #020617; --surface: rgba(30, 41, 59, 0.7);
            --accent: #6366f1; --warning: #f59e0b;
            --success: #10b981; --danger: #ef4444; --text-dim: #94a3b8;
        }
        body {
            font-family: 'Inter', sans-serif; background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent);
            color: white; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .login-card { background: var(--surface); padding: 3rem; border-radius: 24px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        input { padding: 12px 20px; font-size: 1rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; margin-bottom: 1rem; outline: none; }
        #admin-view, #player-view { display: none; }
        #admin-view { padding: 2rem; flex-direction: column; height: 100%; overflow-y: auto; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; background: var(--surface); padding: 1.5rem; border-radius: 16px; margin-bottom: 2rem; }
        .scoreboard-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem; margin-top: 1rem; }
        .group-stat { background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 12px; text-align: center; }
        #player-view { flex: 1; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 2rem; }
        .buzzer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 600px; }
        .quiz-btn { height: 140px; border: none; border-radius: 24px; font-size: 1.2rem; font-weight: 800; color: white; cursor: pointer; background: var(--surface); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; position: relative; }
        
        .btn-correct { background-color: var(--success) !important; box-shadow: 0 0 20px var(--success); }
        .btn-wrong { background-color: var(--danger) !important; box-shadow: 0 0 20px var(--danger); }
        .locked-label { position: absolute; bottom: 10px; left: 0; right: 0; font-size: 0.7rem; color: #fff; opacity: 0.8; }

        .timer-circle { width: 100px; height: 100px; border-radius: 50%; border: 6px solid var(--accent); display: flex; justify-content: center; align-items: center; font-size: 2.5rem; font-weight: 900; margin-bottom: 1rem; }
        #modal-overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); z-index: 1000; display: none; justify-content: center; align-items: center; flex-direction: column; }
        .mcq-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 2rem 0; width: 100%; }
        .option-btn { padding: 15px; background: var(--surface); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 12px; cursor: pointer; }
        .btn-submit { padding: 12px 30px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h1>AIGHAM PRO</h1>
            <input type="password" id="login-input" placeholder="Admin or Group #">
            <br>
            <button class="btn-submit" onclick="handleLogin()">CONNECT</button>
        </div>
    </div>

    <section id="admin-view">
        <div class="admin-header">
            <div>
                <h2 style="margin:0">Admin Control</h2>
                <p id="admin-set-info" style="color: var(--warning)">Start a Set to Begin</p>
            </div>
            <div class="timer-circle" id="admin-timer">30</div>
            <div>
                <button class="btn-submit" onclick="changeSet('A')">SET A</button>
                <button class="btn-submit" onclick="changeSet('B')" style="background:var(--warning)">SET B</button>
            </div>
        </div>
        <div class="scoreboard-grid" id="admin-scoreboard"></div>
    </section>

    <section id="player-view">
        <div id="my-group-label" style="letter-spacing:2px; color:var(--accent); margin-bottom: 10px;">GROUP</div>
        <div class="timer-circle" id="player-timer">30</div>
        <div class="buzzer-grid">
            <button id="btn-red" class="quiz-btn" onclick="loadQuestion('red')">MODULE 1</button>
            <button id="btn-green" class="quiz-btn" onclick="loadQuestion('green')">MODULE 2</button>
            <button id="btn-yellow" class="quiz-btn" onclick="loadQuestion('yellow')">MODULE 3</button>
            <button id="btn-orange" class="quiz-btn" onclick="loadQuestion('orange')">MODULE 4</button>
        </div>
    </section>

    <div id="modal-overlay">
        <div class="modal-card" style="text-align:center; width:85%; max-width:450px;">
            <h2 id="display-q">Question?</h2>
            <div id="area-id"><input type="text" id="answer-id" placeholder="Your Answer..." style="width:90%"></div>
            <div id="area-mcq" class="mcq-grid"></div>
            <div id="modal-footer">
                <button id="final-submit-btn" class="btn-submit" onclick="submitAnswer()">SUBMIT</button>
                <button class="btn-submit" style="background:#475569" onclick="closeModal()">CLOSE</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let myRole = ""; 
        let currentQ = null;
        let activeColor = "";
        let currentSet = "A";

        const questionSets = {
            A: {
                red: { q: "Unit of Force?", a: "newton", type: "mcq", choices: ["Joule", "Newton", "Watt", "Volt"] },
                green: { q: "Nearest star?", a: "sun", type: "id" },
                yellow: { q: "Water Formula?", a: "h2o", type: "id" },
                orange: { q: "Largest Planet?", a: "jupiter", type: "mcq", choices: ["Mars", "Jupiter", "Earth", "Saturn"] }
            },
            B: {
                red: { q: "Powerhouse of cell?", a: "mitochondria", type: "id" },
                green: { q: "Gas we breathe out?", a: "co2", type: "mcq", choices: ["O2", "CO2", "N", "H"] },
                yellow: { q: "Symbol for Gold?", a: "au", type: "id" },
                orange: { q: "Speed of light?", a: "300000", type: "id" }
            }
        };

        function handleLogin() {
            const val = document.getElementById('login-input').value.trim();
            if (val.toLowerCase() === 'admin') {
                myRole = "admin";
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('admin-view').style.display = 'flex';
                initScoreboard();
            } else if (val.toLowerCase().startsWith('group')) {
                myRole = val;
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('player-view').style.display = 'flex';
                document.getElementById('my-group-label').innerText = myRole.toUpperCase();
            }
        }

        function initScoreboard() {
            const board = document.getElementById('admin-scoreboard');
            board.innerHTML = "";
            for (let i = 1; i <= 10; i++) {
                board.innerHTML += `<div class="group-stat"><div>Group ${i}</div><div id="score-${i}" style="font-size:1.5rem">0</div></div>`;
            }
        }

        function changeSet(s) {
            socket.emit('change-set', s);
            socket.emit('start-timer');
        }

        function loadQuestion(color) {
            activeColor = color;
            currentQ = questionSets[currentSet][color];
            const btn = document.getElementById(`btn-${color}`);
            const isLocked = btn.classList.contains('btn-correct') || btn.classList.contains('btn-wrong');

            document.getElementById('display-q').innerText = currentQ.q;
            const mcq = document.getElementById('area-mcq');
            const idArea = document.getElementById('area-id');
            const submitBtn = document.getElementById('final-submit-btn');

            if (currentQ.type === 'mcq') {
                idArea.style.display = 'none'; mcq.style.display = 'grid'; mcq.innerHTML = "";
                currentQ.choices.forEach(c => {
                    mcq.innerHTML += `<button class="option-btn" ${isLocked?'disabled':''} onclick="document.getElementById('answer-id').value='${c}'">${c}</button>`;
                });
            } else {
                idArea.style.display = 'block'; mcq.style.display = 'none';
                document.getElementById('answer-id').value = "";
                document.getElementById('answer-id').disabled = isLocked;
            }

            submitBtn.style.display = isLocked ? 'none' : 'inline-block';
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function submitAnswer() {
            const userAns = document.getElementById('answer-id').value.trim().toLowerCase();
            const isCorrect = userAns === currentQ.a.toLowerCase();
            const gNum = myRole.split(" ")[1];
            socket.emit('submit-module', { group: gNum, color: activeColor, isCorrect });
            closeModal();
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

        function updateLocalUI(group, color, status) {
            if (myRole === `Group ${group}`) {
                const btn = document.getElementById(`btn-${color}`);
                if (btn) {
                    btn.className = 'quiz-btn ' + (status === 'correct' ? 'btn-correct' : 'btn-wrong');
                    btn.innerHTML = `MODULE ${color.toUpperCase()}<div class="locked-label">LOCKED</div>`;
                }
            }
        }

        socket.on('module-synced', (data) => {
            updateLocalUI(data.group, data.color, data.status);
            for (let i = 1; i <= 10; i++) {
                const el = document.getElementById(`score-${i}`);
                if (el) el.innerText = data.scores[i] || 0;
            }
        });

        socket.on('set-updated', (data) => {
            currentSet = data.setName;
            if (myRole === "admin") document.getElementById('admin-set-info').innerText = "Active Set: " + data.setName;
            ['red','green','yellow','orange'].forEach((c, i) => {
                const btn = document.getElementById(`btn-${c}`);
                if (btn) {
                    btn.className = 'quiz-btn'; btn.disabled = false;
                    btn.innerHTML = `MODULE ${i+1}`;
                }
            });
        });

        socket.on('timer-tick', (t) => {
            document.getElementById('admin-timer').innerText = t;
            document.getElementById('player-timer').innerText = t;
        });

        socket.on('timer-end', () => {
            document.querySelectorAll('.quiz-btn').forEach(b => b.disabled = true);
            closeModal();
        });

        socket.on('init-state', (state) => {
            currentSet = state.currentSet;
            const gNum = myRole ? myRole.split(" ")[1] : null;
            
            // Sync scores
            for (let i = 1; i <= 10; i++) {
                const el = document.getElementById(`score-${i}`);
                if (el) el.innerText = state.scores[i] || 0;
                
                // If I am a group, sync my locked buttons from the server
                if (gNum && i == gNum) {
                    Object.keys(state.completedModules[i]).forEach(color => {
                        const status = state.completedModules[i][color];
                        if (status) updateLocalUI(i, color, status);
                    });
                }
            }
        });
    </script>
</body>
</html>
